services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mundo_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=wolfstore_br
      - DB_USERNAME=wolfstore_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redispass123
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mundo_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: mundo_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=wolfstore_br
      - POSTGRES_USER=wolfstore_user
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolfstore_user"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: mundo_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispass123
    volumes:
      - redis-data:/data
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: mundo_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MAILPIT_SMTP_AUTH_ACCEPT_ANY=1
      - MAILPIT_SMTP_AUTH_ALLOW_INSECURE=1
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mundo_pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-changeme123}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: mundo_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:

networks:
  app-network:
    driver: bridge
